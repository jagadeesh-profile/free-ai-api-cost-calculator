<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Cost Calculator</title>
    <script type="module" crossorigin src="/assets/index-DKdrOX28.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-B7OGHU84.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Inject InstantDeploy link with proper styling matching Calculator app theme
      document.addEventListener('DOMContentLoaded', function() {
        const maxRetries = 100;
        let retries = 0;
        const injectLink = setInterval(() => {
          const links = document.querySelectorAll('a[href*="chatslm"], a[href="/"], a[href="/calculator"], a[href="/settings"]');
          let found = false;
          
          for (let link of links) {
            const text = link.textContent.trim();
            if ((text === 'Dashboard' || text === 'Calculator' || text === 'Settings') && link.parentElement) {
              const parent = link.parentElement;
              if (!parent.querySelector('a[href="/instantdeploy/"]')) {
                const newLink = document.createElement('a');
                newLink.href = '/instantdeploy/';
                newLink.textContent = 'InstantDeploy';
                // Copy computed styles from existing links to match theme
                newLink.style.cssText = link.style.cssText || '';
                newLink.className = link.className || '';
                // Ensure alignment and spacing
                newLink.style.marginRight = '0';
                newLink.style.marginLeft = '0';
                newLink.style.display = link.style.display || 'inline-block';
                if (parent.style.display === 'flex' || window.getComputedStyle(parent).display === 'flex') {
                  newLink.style.display = 'inline-block';
                }
                parent.appendChild(newLink);
                found = true;
                break;
              }
            }
          }
          
          if (found || retries++ > maxRetries) {
            clearInterval(injectLink);
          }
        }, 50);
      });
      
      // Fix API calls in instantdeploy app to use correct base URL
      window.addEventListener('load', function() {
        // Override fetch to route API calls correctly
        const originalFetch = window.fetch;
        window.fetch = function(url, options) {
          let newUrl = url;
          if (typeof url === 'string') {
            if (url.startsWith('/api/v1') && !url.startsWith('/instantdeploy-api')) {
              newUrl = url.replace('/api/v1', '/instantdeploy-api/v1');
            } else if (url.includes('auth/login') && !url.includes('instantdeploy-api')) {
              newUrl = url.replace(/^\//, '/instantdeploy-api/v1/');
            }
          }
          return originalFetch.call(this, newUrl, options);
        };
      });
    </script>
  </body>
</html>
