<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Cost Calculator</title>
    <script type="module" crossorigin src="/assets/index-DKdrOX28.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-B7OGHU84.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Inject InstantDeploy link into the navigation after app loads
        const maxRetries = 50;
        let retries = 0;
        const injectLink = setInterval(() => {
          // Look for the Additional Links section or navigation
          const links = document.querySelectorAll('a');
          let found = false;
          for (let link of links) {
            if (link.textContent.includes('Calculator') || link.textContent.includes('Settings')) {
              // Found navigation area
              const parent = link.parentElement;
              if (parent && !parent.querySelector('a[href="/instantdeploy/"]')) {
                const newLink = document.createElement('a');
                newLink.href = '/instantdeploy/';
                newLink.textContent = 'InstantDeploy';
                newLink.style.display = 'block';
                newLink.style.margin = '8px 0';
                newLink.style.color = 'inherit';
                newLink.style.textDecoration = 'none';
                parent.appendChild(newLink);
                found = true;
                break;
              }
            }
          }
          if (found || retries++ > maxRetries) {
            clearInterval(injectLink);
          }
        }, 100);
      });
    </script>
  </body>
</html>
