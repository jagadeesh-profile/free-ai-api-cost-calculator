version: '3.8'

services:
  api-calculator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-cost-calculator
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    networks:
      - calculator-network
    # volumes:
      # Mount for development (comment out for production)
      # - ./public:/usr/share/nginx/html:ro
    labels:
      - "com.example.description=AI API Cost Calculator"
      - "com.example.department=Engineering"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  calculator-network:
    driver: bridge

# Optional: Add volume for persistent data if needed
# volumes:
#   calculator-data:
