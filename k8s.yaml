apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-calculator-deployment
  labels:
    app: api-calculator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-calculator
  template:
    metadata:
      labels:
        app: api-calculator
    spec:
      containers:
      - name: api-calculator
        image: api-calculator-k8s:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: api-calculator-service
spec:
  type: NodePort
  selector:
    app: api-calculator
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080
